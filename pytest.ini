[pytest]
# Pytest configuration for Game Oracle tests

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = -v --tb=short --strict-markers

# Markers for categorizing tests
markers =
    unit: Unit tests for individual modules
    integration: Integration tests for API and modules
    slow: Tests that take longer to run
    api: Tests for API endpoints
    pipeline: Tests for data collection pipeline
    models: Tests for data models
    processors: Tests for data processors
    text_cleaning: Tests for text cleaning functionality

# Coverage options
[coverage:run]
source = backend
omit =
    */tests/*
    */test_*.py
    setup.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
